    Projects:
      - name: Lightweight LLM Reproduction and Multimodal Extension
        summary: Reproduced a small-parameter decoder-only LLM pipeline from pretraining through SFT/LoRA, reinforcement learning, inference, and multimodal extension.
        highlights:
          - Covered tokenizer, data construction, training, fine-tuning, RL training, sampling, KV cache, and deployment.
          - Extended the pipeline toward speech-vision-language multimodal modeling.

      - name: Coding Agent Prototype
        summary: Built a code-oriented LLM agent prototype that closes the loop from user task understanding to file edits, command execution, verification, and error repair.
        highlights:
          - Designed task parsing, context management, tool calling, and result feedback workflows.
          - Supported code understanding, modification, validation, and iterative debugging.

      - name: 3D Gaussian Human and Head Avatar Reconstruction
        summary: Developed a series of 3D Gaussian avatar methods for animatable human/head reconstruction and high-fidelity rendering.
        highlights:
          - Worked on deformable Gaussian representations, topology constraints, barycentric parameterization, layered densification, and prior-guided appearance learning.
          - Related work includes 3DGA, CANVAS, and HiFiAvatar.

      - name: BSSNet Real-Time Road Scene Semantic Segmentation
        summary: Designed a real-time semantic segmentation network for road scenes inspired by autoencoder structures.
        highlights:
          - Balanced segmentation accuracy, inference speed, and model complexity.
          - Published in IEEE TCSVT.

