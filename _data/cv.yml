        location: China
        start_date: 2021-09
        end_date: Present
        summary: Research on multimodal models, agent systems, computer vision, and animatable 3D Gaussian avatars.
        highlights:
          - Built and studied lightweight decoder-only LLM training pipelines covering tokenizer/data construction, pretraining, SFT/LoRA fine-tuning, reinforcement learning training, and inference deployment.
          - Explored multimodal extensions for speech-vision-language modeling, including visual encoder to LLM alignment, image-text instruction data, VQA, and caption prototypes.
          - Designed coding-agent prototypes with task parsing, context management, tool calling, command execution, result feedback, code editing, validation, and error-repair loops.
          - Developed high-fidelity 3D Gaussian human/head avatar methods with deformable Gaussians, topology constraints, layered densification, prior-guided appearance learning, and animatable rendering.

